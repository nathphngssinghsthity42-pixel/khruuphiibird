<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<title>khruuphiibird</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
background:#000;
}

/* วิดีโอพื้นหลัง */

.background-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
z-index:-2;
}

/* การ์ดหลัก */

.container{
width:100%;
max-width:750px;
}

.card{
position:relative;
overflow:hidden;
background:rgba(255,255,255,.12);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,.15);
border-radius:35px;
box-shadow:0 10px 50px rgba(0,0,0,.35);
padding:30px;
}

/* วิดีโอในการ์ด */

.card-video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.20;
z-index:-1;
}

/* Header */

.top-bar{
display:flex;
justify-content:flex-end;
gap:10px;
margin-bottom:20px;
}

.top-btn{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
border-radius:15px;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.15);
color:white;
text-decoration:none;
}

.subscribe{
width:auto;
padding:0 18px;
font-weight:600;
}

/* โปรไฟล์ */

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:4px solid rgba(255,255,255,.25);
box-shadow:0 0 30px rgba(255,255,255,.2);
}

.site-name{
text-align:center;
margin-top:18px;
font-size:42px;
font-weight:800;
color:white;
}

.thai-name{
text-align:center;
color:#f0f0f0;
font-size:18px;
margin-top:5px;
}

.bio{
text-align:center;
color:white;
opacity:.9;
margin-top:12px;
line-height:1.8;
}

/* Social */

.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.social a{
width:55px;
height:55px;
display:flex;
justify-content:center;
align-items:center;
border-radius:18px;
background:rgba(255,255,255,.15);
border:1px solid rgba(255,255,255,.15);
color:white;
font-size:22px;
text-decoration:none;
transition:.3s;
}

.social a:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.25);
}

/* ลิงก์ */

.links{
margin-top:30px;
display:flex;
flex-direction:column;
gap:16px;
}

.link{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:18px;
border-radius:20px;
text-decoration:none;
color:white;
font-weight:600;
font-size:17px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.15);
transition:.3s;
}

.link:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.22);
}

.kahoot{
background:linear-gradient(
135deg,
#6f2cff,
#9b4dff
);
font-size:20px;
font-weight:700;
box-shadow:0 0 30px rgba(123,46,255,.7);
}

.kahoot:hover{
transform:translateY(-5px) scale(1.02);
}

/* Footer */

.footer{
margin-top:25px;
text-align:center;
color:white;
opacity:.75;
font-size:14px;
}

@media(max-width:768px){

body{
padding:15px;
}

.site-name{
font-size:32px;
}

.profile{
width:110px;
height:110px;
}

.card{
padding:20px;
}

}

</style>
</head>
