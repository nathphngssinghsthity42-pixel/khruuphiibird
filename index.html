<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#000;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

/* พื้นหลัง */

.background-video{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-3;

}

.overlay{

position:fixed;

inset:0;

background:
rgba(0,0,0,.18);

z-index:-2;

}

/* การ์ด */

.card{

position:relative;

width:100%;

max-width:760px;

overflow:hidden;

border-radius:42px;

padding:40px;

background:

rgba(255,255,255,.05);

backdrop-filter:none;

border:

1px solid rgba(255,255,255,.15);

box-shadow:

0 20px 60px rgba(0,0,0,.35);

}

/* คลิปในกรอบ */

.card-video{

position:absolute;

inset:0;

width:100%;

height:100%;

object-fit:cover;

opacity:.95;

z-index:-1;

}

/* ปุ่มบน */

.top{

display:flex;

justify-content:flex-end;

gap:14px;

}

.top a{

color:white;

text-decoration:none;

padding:16px 24px;

border-radius:18px;

background:

rgba(255,255,255,.14);

font-size:22px;

font-weight:700;

}

/* โปรไฟล์ */

.profile{

width:170px;

height:170px;

border-radius:50%;

object-fit:cover;

display:block;

margin:

30px auto;

border:

4px solid rgba(255,255,255,.3);

}

/* ชื่อ */

.title{

width:100%;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

font-size:78px;

font-weight:800;

line-height:1;

letter-spacing:-2px;

color:white;

}

.subtitle{

text-align:center;

color:white;

font-size:30px;

margin-top:12px;

}

.bio{

text-align:center;

color:white;

font-size:22px;

margin-top:16px;

}

/* social */

.social{

display:flex;

justify-content:center;

gap:20px;

margin-top:35px;

}

.social a{

width:90px;

height:90px;

display:flex;

align-items:center;

justify-content:center;

border-radius:28px;

background:

rgba(255,255,255,.12);

color:white;

font-size:40px;

text-decoration:none;

}

/* links */

.links{

display:flex;

flex-direction:column;

gap:20px;

margin-top:40px;

}

.links a{

display:flex;

align-items:center;

justify-content:center;

gap:16px;

padding:28px;

text-decoration:none;

color:white;

font-size:28px;

font-weight:700;

border-radius:28px;

background:

rgba(255,255,255,.12);

}

.kahoot{

background:

linear-gradient(

135deg,

#6d2fff,

#b04cff

);

box-shadow:

0 0 45px

rgba(112,45,255,.7);

}

.klogo{

width:45px;

height:45px;

object-fit:contain;

}

.footer{

margin-top:30px;

text-align:center;

color:white;

opacity:.7;

}

/* มือถือ */

@media(max-width:768px){

.title{

font-size:56px;

}

.profile{

width:130px;

height:130px;

}

.links a{

font-size:18px;

padding:22px;

}

}
