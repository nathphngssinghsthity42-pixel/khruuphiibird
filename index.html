<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#000;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:25px;
overflow-x:hidden;
}

/* วิดีโอพื้นหลัง */

.background-video{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-3;

}

/* Overlay */

.overlay{

position:fixed;

inset:0;

background:
rgba(0,0,0,.22);

z-index:-2;

}

/* การ์ด */

.card{

position:relative;

max-width:760px;

width:100%;

padding:35px;

border-radius:38px;

overflow:hidden;

/* ไม่เบลอ */

background:
rgba(255,255,255,.05);

backdrop-filter:none;

border:
1px solid rgba(255,255,255,.18);

box-shadow:

0 10px 40px rgba(0,0,0,.25);

}

/* คลิปในกรอบ */

.card-video{

position:absolute;

inset:0;

width:100%;

height:100%;

object-fit:cover;

opacity:.95;

filter:none;

z-index:-1;

}

/* Header */

.top{

display:flex;

justify-content:flex-end;

gap:12px;

}

.top a{

text-decoration:none;

color:white;

background:
rgba(255,255,255,.12);

padding:

14px 20px;

border-radius:18px;

font-weight:600;

}

.top a:hover{

background:
rgba(255,255,255,.22);

}

/* โปรไฟล์ */

.profile{

width:140px;

height:140px;

display:block;

margin:

35px auto 20px;

border-radius:50%;

object-fit:cover;

border:

4px solid rgba(255,255,255,.35);

}

.title{

font-size:58px;

font-weight:800;

text-align:center;

color:white;

}

.subtitle{

text-align:center;

font-size:22px;

color:white;

margin-top:8px;

}

.bio{

text-align:center;

margin-top:14px;

color:white;

font-size:20px;

}

/* social */

.social{

display:flex;

justify-content:center;

gap:18px;

margin-top:30px;

}

.social a{

width:75px;

height:75px;

display:flex;

align-items:center;

justify-content:center;

font-size:34px;

text-decoration:none;

color:white;

background:

rgba(255,255,255,.12);

border-radius:22px;

}

/* ลิงก์ */

.links{

margin-top:35px;

display:flex;

flex-direction:column;

gap:18px;

}

.links a{

display:flex;

align-items:center;

justify-content:center;

gap:14px;

padding:24px;

border-radius:24px;

background:

rgba(255,255,255,.12);

text-decoration:none;

color:white;

font-size:22px;

font-weight:700;

}

.links a:hover{

transform:
translateY(-3px);

}

.kahoot{

background:

linear-gradient(

135deg,

#7b2eff,

#b154ff

);

box-shadow:

0 0 35px

rgba(123,46,255,.7);

}

.klogo{

width:36px;

height:36px;

object-fit:contain;

}

.footer{

margin-top:28px;

text-align:center;

color:white;

opacity:.7;

}

@media(max-width:768px){

.title{

font-size:42px;

}

.profile{

width:120px;

height:120px;

}

.links a{

font-size:18px;

padding:20px;

}

}
